server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html;
    charset utf-8;

    # Only the bare slash
    location = / {
        return 301 /en/;  # use 302 during dev if you prefer
    }

    # If this is a static site (not an SPA)
    location / {
        try_files $uri $uri/ =404;
    }

    # Static assets
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        access_log off;
        expires max;
        add_header Cache-Control "public";
    }
}
